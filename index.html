/* ═══════════════════════ ROULETTE SHEET ═══════════════════════ */
function RouletteSheet({ onClose, onConfirm }) {
  const [phase, setPhase] = useState('spinning'); // spinning | stopping | result
  const [result, setResult] = useState(null);
  const angleRef = useRef(0);
  const wheelRef = useRef(null);
  const rafRef = useRef(null);

  const apply = () => {if (wheelRef.current) wheelRef.current.style.transform = `rotate(${angleRef.current}deg)`;};

  const idleSpin = useCallback(() => {
    cancelAnimationFrame(rafRef.current);
    const loop = () => {angleRef.current += 7;apply();rafRef.current = requestAnimationFrame(loop);};
    rafRef.current = requestAnimationFrame(loop);
  }, []);

  useEffect(() => {idleSpin();return () => cancelAnimationFrame(rafRef.current);}, [idleSpin]);

  function handleStop() {
    if (phase !== 'spinning') return;
    cancelAnimationFrame(rafRef.current);
    setPhase('stopping');
    const t = Math.floor(Math.random() * 3);
    // land with segment t's CENTER under the top pointer, plus a small in-segment jitter
    const jitter = (Math.random() * 2 - 1) * 34; // ±34° stays well inside the 120° wedge
    const targetMod = ((300 - t * 120 + jitter) % 360 + 360) % 360;
    const start = angleRef.current;
    const startMod = (start % 360 + 360) % 360;
    const delta = 5 * 360 + (targetMod - startMod + 360) % 360;
    const dur = 3700,t0 = performance.now();
    const ease = (x) => 1 - Math.pow(1 - x, 3);
    const loop = (now) => {
      const p = Math.min(1, (now - t0) / dur);
      angleRef.current = start + delta * ease(p);
      apply();
      if (p < 1) rafRef.current = requestAnimationFrame(loop);else
      {
        // result = the wedge actually under the pointer (what you see is what you get)
        const finalMod = (angleRef.current % 360 + 360) % 360;
        const aimed = (360 - finalMod + 360) % 360; // conic angle sitting under the top pointer
        const idx = Math.floor(aimed / 120) % 3;
        setResult(MENUS[idx]);setPhase('result');
      }
    };
    rafRef.current = requestAnimationFrame(loop);
  }

  function respin() {
    setResult(null);setPhase('spinning');idleSpin();
  }

  // wheel visual
  const seg = '#E29C63 0deg 120deg, #6C40F0 120deg 240deg, #FFD04E 240deg 360deg';
  const labelAngle = (i) => i * 120 + 60;

  const btn = (() => {
    if (phase === 'result') return { txt: `이 메뉴로 할래요!`, on: true, action: () => onConfirm(result.id), bg: 'var(--g900)' };
    if (phase === 'stopping') return { txt: '두구두구…', on: false, action: () => {}, bg: 'var(--g300)' };
    return { txt: 'STOP', on: true, action: handleStop, bg: 'var(--hot)' };
  })();

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 50, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', animation: 'fadeIn .25s ease' }} />
      <div style={{ position: 'relative', background: 'var(--white)', borderRadius: '24px 24px 0 0', padding: '10px 20px 26px', animation: 'sheetUp .32s cubic-bezier(.22,1,.36,1)', boxShadow: '0 -4px 24px rgba(0,0,0,0.18)' }}>
        <div style={{ width: 40, height: 4, borderRadius: 2, background: 'var(--g200)', margin: '4px auto 14px' }} />
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 19, fontWeight: 700, color: 'var(--g900)', letterSpacing: '-0.4px' }}>메뉴 룰렛</div>
          <div style={{ fontSize: 13, color: 'var(--g500)', marginTop: 5 }}>
            {phase === 'result' ? '운명이 정한 오늘의 메뉴!' : phase === 'stopping' ? '멈추는 중…' : 'STOP을 눌러 메뉴를 골라보세요'}
          </div>
        </div>

        {/* wheel */}
        <div style={{ position: 'relative', width: 248, height: 248, margin: '20px auto 6px' }}>
          {/* pointer */}
          <div style={{ position: 'absolute', top: -6, left: '50%', transform: 'translateX(-50%)', zIndex: 3, filter: 'drop-shadow(0 2px 3px rgba(0,0,0,.25))' }}>
            <svg width="30" height="30" viewBox="0 0 30 30"><path d="M15 26L4 7C7 4 11 2.5 15 2.5C19 2.5 23 4 26 7L15 26Z" fill="var(--g900)" /><circle cx="15" cy="9" r="3.2" fill="#fff" /></svg>
          </div>
          {/* ring */}

/* ═══════════════════════ APP ═══════════════════════ */
function App() {
  const [screen, setScreen] = useState('nickname'); // nickname | menu | schedule | summary | results
  const [nickname, setNickname] = useState('');
  const [menu, setMenu] = useState([]);
  const [date, setDate] = useState([]);
  const [sheet, setSheet] = useState(false);
  const [justRouletted, setJustRouletted] = useState(null);

  const showSteps = screen === 'menu' || screen === 'schedule' || screen === 'summary';
  const stepIndex = screen === 'menu' ? 0 : screen === 'schedule' ? 1 : 2;

  function back() {
    if (screen === 'menu') setScreen('nickname');else
    if (screen === 'schedule') setScreen('menu');else
    if (screen === 'summary') setScreen('schedule');else
    if (screen === 'results') setScreen('summary');
  }
  function toggleMenu(id) {
    setMenu((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : prev.length < 2 ? [...prev, id] : prev);
  }
  function confirmRoulette(id) {
    setMenu((prev) => prev.includes(id) ? prev : prev.length < 2 ? [...prev, id] : [prev[0], id]);
    setSheet(false);setJustRouletted(id);
    setTimeout(() => setJustRouletted(null), 600);
  }
  function toggleDate(d) {
    setDate((prev) => prev.includes(d) ? prev.filter((x) => x !== d) : [...prev, d].sort((a, b) => a - b));
  }
  function restart() {setScreen('menu');setMenu([]);setDate([]);}

  return (
    <div className="shell">
      <Header stepIndex={stepIndex} showSteps={showSteps} onBack={back} canBack={screen !== 'nickname'} />
      {screen === 'nickname' &&
      <NicknameScreen value={nickname} onChange={setNickname} onNext={() => setScreen('menu')} />
      }
      {screen === 'menu' &&
      <MenuScreen selected={menu} onSelect={toggleMenu} onRoulette={() => setSheet(true)} onNext={() => setScreen('schedule')} justRouletted={justRouletted} />
      }
      {screen === 'schedule' &&
      <ScheduleScreen menu={menu} selected={date} onSelect={toggleDate} onNext={() => setScreen('summary')} />
      }
      {screen === 'summary' &&
      <SummaryScreen menu={menu} date={date} onRestart={restart} onComplete={async () => {
        try {
          await db.collection('votes').doc(nickname.trim() || '익명').set({
            nickname: nickname.trim() || '익명',
            menus: menu,
            dates: date,
            submittedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch(e) { console.error('저장 실패:', e); }
        setScreen('results');
      }} />
      }
      {screen === 'results' &&
      <ResultsScreen nickname={nickname} menu={menu} date={date} onRestart={restart} />
      }
      {sheet && <RouletteSheet onClose={() => setSheet(false)} onConfirm={confirmRoulette} />}
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
